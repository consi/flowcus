name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag must be semver: v1.2.3"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Inject version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" frontend/package.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb -p flowcus-app --no-build --target ${{ matrix.target }}

      - name: Stage artifacts
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/flowcus artifacts/flowcus-linux-${{ matrix.arch }}
          cp target/${{ matrix.target }}/debian/*.deb artifacts/flowcus_${VERSION}_${{ matrix.arch }}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/

  docker:
    name: Docker (${{ matrix.platform }})
    needs: prepare
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error

  docker-manifest:
    name: Docker manifest
    runs-on: ubuntu-latest
    needs: [prepare, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: docker-digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          DIGESTS=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" $DIGESTS

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build, docker-manifest]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: Flowcus ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
